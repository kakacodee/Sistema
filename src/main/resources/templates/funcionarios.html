<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Funcionários</title>
    <meta charset="UTF-8"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
          crossorigin="anonymous">
</head>
<body class="bg-light">

<div class="container mt-4">
    <h1 class="text-center mb-4">Funcionários</h1>
    <button class="btn btn-secondary" onclick="history.back()">Voltar</button>

    <!-- Formulário -->
    <form th:action="@{/Funcionarios}" method="post" class="card p-4 shadow-sm mb-5">
        <div class="mb-3">
            <label for="nome" class="form-label">Nome</label>
            <input type="text" id="nome" name="nome" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="data_nascimento" class="form-label">Data de Nascimento</label>
            <input type="date" id="data_nascimento" name="data_nascimento" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="cargo" class="form-label">Cargo</label>
            <input type="text" id="cargo" name="cargo" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="salario" class="form-label">Salário</label>
            <input type="number" id="salario" name="salario" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-success w-100">Salvar</button>
    </form>

    <!-- Lista de Funcionários -->
    <h2 class="mb-3">Lista de Funcionários</h2>
    <table class="table table-striped table-hover shadow-sm">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Data de Nascimento</th>
            <th>Cargo</th>
            <th>Salário</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="func : ${funcionarios}">
            <td th:text="${func.id}"></td>
            <td th:text="${func.nome}"></td>
            <td th:text="${func.data_nascimento}"></td>
            <td th:text="${func.cargo}"></td>
            <td th:text="${func.salario}"></td>
            <td>
                <a th:href="@{/Funcionarios/delete/{id}(id=${func.id})}"
                   class="btn btn-danger btn-sm">Deletar</a>
            </td>
        </tr>
        </tbody>
    </table>

    <!-- Botão apagar tudo -->
    <form th:action="@{http://localhost:3002/Funcionarios/deleteall}" method="get">
        <button type="submit" class="btn btn-outline-danger">Apagar tudo</button>
    </form>
</div>

</body>
</html>
