<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
          crossorigin="anonymous">
</head>
<body>
<h2 class="mb-4 text-center">Catálogo de Produtos</h2>
<nav class="nav justify-content-center mb-4">
    <!--<a class="btn btn-primary mx-2" th:href="@{/Tarefas}">Tarefas</a>-->
    <a class="btn btn-primary mx-2" th:href="@{/login}">Login</a>
    <a class="btn btn-primary mx-2" th:href="@{/cadastro}">Cadastro</a>

</nav>
<div class="row">
    <div class="col-md-4 mb-4" th:each="produto : ${produtos}">
        <!-- <div class="card shadow-sm h-100">
           <img th:src="${produto.imagem}" class="card-img-top" alt="Imagem do produto">-->
            <div class="card-body">
                <h5 class="card-title" th:text="${produto.nome}"></h5>
                <p class="card-text">
                    Preço: R$ <span th:text="${produto.preco}"></span><br></p>
                <p class="card-text">  Estoque: <span th:text="${produto.estoque}"></span> unidades</p>

                <!--<a href="#" class="btn btn-primary">Adicionar ao carrinho</a>-->
            </div>
        </div>
    </div>
</div>

</body>
</html>
