<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Finanças</title>
    <meta charset="UTF-8"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
          crossorigin="anonymous">
</head>
<body>
<h1>Finanças</h1>

<form th:action="@{/FinancasFuncionario}" method="post">
    Nome: <input type="text" name="nome" required/>
    Valor: <input type="number" step="0.01" name="valor" required/>
   Tipo: <select id="tipo" name="tipo" required>
        <option value="ENTRADA">Entrada</option>
        <option value="SAIDA">Saída</option>
    </select>
    Data: <input type="date" name="data" required/>
    <button type="submit">Salvar</button>
</form>

<h2>Gastos/Lucros</h2>
<table border="1">
    <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Valor</th>
        <th>Tipo</th>
        <th>Data</th>
    </tr>
    <tr th:each="financaF : ${financasFuncionario}">
        <td th:text="${financaF.id}"></td>
        <td th:text="${financaF.nome}"></td>
        <td th:text="${financaF.valor}"></td>
        <td th:text="${financaF.tipo}"></td>
        <td th:text="${financaF.data}"></td>
        <td>
            <a th:action="@{http://localhost:3002/FinancasFuncionario/delete{id}}" method="get" th:href="@{/FinancasFuncionario/delete/{id}(id=${financaF.id})}">Deletar</a>
        </td>
    </tr>
</table>
<p>Saldo atualizado: <span th:text="${resultado}"></span></p>

<form th:action="@{http://localhost:3002/FinancasFuncionario/deleteall}" method="get">
    <button type="submit">Apagar tudo</button>
</form>
</body>
</html>
