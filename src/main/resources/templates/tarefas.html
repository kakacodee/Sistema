<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Tarefas</title>
    <meta charset="UTF-8"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
          crossorigin="anonymous">
</head>
<body class="bg-light">

<div class="container mt-4">
    <h1 class="text-center mb-4">Cadastro de Tarefas</h1>
    <button class="btn btn-secondary" onclick="history.back()">Voltar</button>

    <!-- Formulário -->
    <form th:action="@{/Tarefas}" method="post" class="card p-4 shadow-sm mb-5">
        <div class="mb-3">
            <label for="nome" class="form-label">Nome</label>
            <input type="text" id="nome" name="nome" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="descricao" class="form-label">Descrição</label>
            <input type="text" id="descricao" name="descricao" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="data_inicio" class="form-label">Data de Início</label>
            <input type="date" id="data_inicio" name="data_inicio" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="data_fim" class="form-label">Data de Encerramento</label>
            <input type="date" id="data_fim" name="data_fim" class="form-control" required>
        </div>
        <div class="mb-3">
            <label for="status" class="form-label">Status</label>
            <select id="status" name="status" class="form-select" required>
                <option value="EM_ANDAMENTO">Em Andamento</option>
                <option value="CONCLUIDO">Concluído</option>

            </select>
        </div>
        <button type="submit" class="btn btn-success w-100">Salvar</button>
    </form>

    <!-- Lista de Tarefas -->

    <h2 class="mb-3">Em Andamento</h2>
    <table class="table table-striped table-hover shadow-sm">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Descrição</th>
            <th>Data de Início</th>
            <th>Data de Encerramento</th>
            <th>Status</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="tarefa : ${emAndamento}">
            <td th:text="${tarefa.id}"></td>
            <td th:text="${tarefa.nome}" th:classappend="${tarefa.status == 'EM_ANDAMENTO'} ? 'text-danger' : 'text-primary'"></td>
            <td th:text="${tarefa.descricao}"></td>
            <td th:text="${tarefa.data_inicio}"></td>
            <td th:text="${tarefa.data_fim}"></td>
            <td th:text="${tarefa.status}"></td>
            <td>
                <a th:href="@{/Tarefas/delete/{id}(id=${tarefa.id})}"
                   class="btn btn-danger btn-sm">Deletar</a>
            </td>
        </tr>
        </tbody>
    </table>

    <h2 class="mb-3">Concluídas</h2>
    <table class="table table-striped table-hover shadow-sm">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Descrição</th>
            <th>Data de Início</th>
            <th>Data de Encerramento</th>
            <th>Status</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="tarefa : ${concluido}">
            <td th:text="${tarefa.id}"></td>
            <td th:text="${tarefa.nome}" th:classappend="${tarefa.status == 'EM_ANDAMENTO'} ? 'text-danger' : 'text-primary'"></td>
            <td th:text="${tarefa.descricao}"></td>
            <td th:text="${tarefa.data_inicio}"></td>
            <td th:text="${tarefa.data_fim}"></td>
            <td th:text="${tarefa.status}"></td>
            <td>
                <a th:href="@{/Tarefas/delete/{id}(id=${tarefa.id})}"
                   class="btn btn-danger btn-sm">Deletar</a>
            </td>
        </tr>
        </tbody>
    </table>

    <!-- Botão apagar tudo -->
    <form th:action="@{http://localhost:3002/Tarefas/deleteall}" method="get">
        <button type="submit" class="btn btn-outline-danger">Apagar tudo</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
