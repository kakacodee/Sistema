<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Finanças</title>
    <meta charset="UTF-8"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
          crossorigin="anonymous">
</head>
<body class="bg-light">

<div class="container mt-4">
    <h1 class="mb-4 text-center">Finanças</h1>
    <button class="btn btn-secondary" onclick="history.back()">Voltar</button>

    <!-- Formulário -->
    <form th:action="@{/Financas}" method="post" class="card p-4 shadow-sm mb-5">
        <div class="mb-3">
            <label for="nome" class="form-label">Nome</label>
            <input type="text" id="nome" name="nome" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="valor" class="form-label">Valor</label>
            <input type="number" step="0.01" id="valor" name="valor" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="tipo" class="form-label">Tipo</label>
            <select id="tipo" name="tipo" class="form-select" required>
                <option value="ENTRADA">Entrada</option>
                <option value="SAIDA">Saída</option>
            </select>
        </div>

        <div class="mb-3">
            <label for="data" class="form-label">Data</label>
            <input type="date" id="data" name="data" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-success w-100">Salvar</button>
    </form>

    <!-- Tabela -->
    <h2 class="mb-3">Gastos/Lucros</h2>
    <table class="table table-striped table-hover shadow-sm">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Valor</th>
            <th>Tipo</th>
            <th>Data</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="financa : ${financas}">
            <td th:text="${financa.id}"></td>
            <td th:text="${financa.nome}"></td>
            <td th:text="${financa.valor}"
                th:classappend="${financa.valor < 0} ? 'text-danger' : 'text-primary'"></td>
            <td th:text="${financa.tipo}"></td>
            <td th:text="${financa.data}"></td>
            <td>
                <a th:href="@{/Financas/delete/{id}(id=${financa.id})}"
                   class="btn btn-danger btn-sm">Deletar</a>
            </td>
        </tr>
        </tbody>
    </table>

    <!-- Saldo -->
    <p class="fw-bold">Saldo atualizado: <span th:text="${resultado}"
    th:classappend="${resultado < 0} ? 'text-danger' : 'text-primary'"></span></p>

    <!-- Botão apagar tudo -->
    <form th:action="@{http://localhost:3002/Financas/deleteall}" method="get">
        <button type="submit" class="btn btn-outline-danger">Apagar tudo</button>
    </form>

</div>

<div th:if="${resultado < 0}" class="alert alert-danger" role="alert">
    Saldo insuficiente...
</div>
</body>
</html>
