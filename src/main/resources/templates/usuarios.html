<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Usuários</title>
    <meta charset="UTF-8"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
          crossorigin="anonymous">
</head>
<body class="bg-light">

<div class="container mt-4">
    <h1 class="text-center mb-4">Cadastro de Usuários</h1>
    <button class="btn btn-secondary" onclick="history.back()">Voltar</button>

    <!-- Formulário -->
    <form th:action="@{/Usuario}" method="post" class="card p-4 shadow-sm mb-5">
        <div class="mb-3">
            <label for="nome" class="form-label">Nome</label>
            <input type="text" id="nome" name="nome" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="email" class="form-label">E-Mail</label>
            <input type="email" id="email" name="email" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="senha" class="form-label">Senha</label>
            <input type="password" id="senha" name="senha" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="papel" class="form-label">Papel</label>
            <select id="papel" name="papel" class="form-select" required>
                <option value="FUNCIONARIO">Funcionário</option>
                <option value="GERENTE">Gerente</option>
                <option value="FORNECEDOR">Fornecedor</option>
            </select>
        </div>

        <button type="submit" class="btn btn-success w-100">Salvar</button>
    </form>

    <!-- Lista de Usuários -->
    <h2 class="mb-3">Lista de Usuários</h2>
    <table class="table table-striped table-hover shadow-sm">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>E-Mail</th>
            <th>Senha</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="user : ${users}">
            <td th:text="${user.id}"></td>
            <td th:text="${user.nome}"></td>
            <td th:text="${user.email}"></td>
            <td th:text="${user.senha}"></td>
            <td>
                <a th:href="@{/Usuario/delete/{id}(id=${user.id})}"
                   class="btn btn-danger btn-sm">Deletar</a>
            </td>
        </tr>
        </tbody>
    </table>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
